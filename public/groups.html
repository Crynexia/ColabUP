<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupos — ColabUp</title>
<meta name="theme-color" content="#1E3A5F">
<link rel="icon" href="assets/images/logo.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Google Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

<link rel="stylesheet" href="assets/styles/styles.css">
<link rel="stylesheet" href="assets/styles/dashboard.css">
<link rel="stylesheet" href="assets/styles/groups.css">
<link rel="stylesheet" href="assets/styles/chatbot.css">
</head>
<body>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-shell">
  <aside class="app-sidebar" id="sidebar">
    <a href="index.html" class="brand"><img src="assets/images/logo.png" alt="ColabUp"></a>
    <nav class="app-nav">
      <a href="dashboard.html"><i class="fa-solid fa-grip"></i> Dashboard</a>
      <a href="profile.html"><i class="fa-solid fa-user"></i> Mi perfil</a>
      <a href="projects.html"><i class="fa-solid fa-diagram-project"></i> Proyectos</a>
      <a href="groups.html" class="is-active"><i class="fa-solid fa-users-rectangle"></i> Grupos</a>
      <a href="messages.html"><i class="fa-solid fa-message"></i> Mensajes</a>
      <a href="notifications.html"><i class="fa-solid fa-bell"></i> Notificaciones</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Configuración</a>
      <a href="help.html"><i class="fa-solid fa-circle-question"></i> Ayuda</a>
    </nav>
    <div class="app-sidebar-footer">
      <button id="logout-btn" style="width:100%; background:none; border:none; cursor:pointer; padding:0;">
        <span style="display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:8px; font-size:14px; font-weight:600; font-family: var(--font-display); color: rgba(255,255,255,0.7);">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar sesión
        </span>
      </button>
    </div>
  </aside>

  <div class="app-main">
    <header class="app-topbar">
      <button class="icon-btn nav-toggle-mobile" id="sidebar-toggle" aria-label="Abrir menú"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-search">
        <i class="fa-solid fa-magnifying-glass" style="color:#8b93a1;"></i>
        <input type="search" placeholder="Buscar proyectos, personas, grupos...">
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" aria-label="Notificaciones"><i class="fa-solid fa-bell"></i><span class="dot"></span></button>
        <button class="icon-btn" aria-label="Mensajes"><i class="fa-solid fa-message"></i></button>
        <div class="user-chip">
          <span class="avatar" id="user-avatar-topbar">U</span>
          <span id="user-name-topbar">Usuario</span>
        </div>
      </div>
    </header>

    <main class="app-content">

      <!-- Grid view -->
      <div id="groups-list-view">
        <section class="page-head">
          <div>
            <h1>Grupos</h1>
            <p>Únete a comunidades de interés o crea la tuya para coordinar tu equipo.</p>
          </div>
          <button class="btn btn-accent" id="open-create-group-btn"><i class="fa-solid fa-plus"></i> Crear grupo</button>
        </section>

        <div class="groups-toolbar">
          <div class="groups-search">
            <i class="fa-solid fa-magnifying-glass" style="color:#8b93a1;"></i>
            <input type="search" id="group-search-input" placeholder="Buscar grupos por nombre o categoría...">
          </div>
          <button class="filter-chip is-active" data-group-filter="all">Todos</button>
          <button class="filter-chip" data-group-filter="joined">Mis grupos</button>
        </div>

        <p id="groups-results-count" style="font-size:13px; color:#8b93a1; margin-bottom: var(--space-2);"></p>
        <div class="groups-grid" id="groups-grid"></div>
      </div>

      <!-- Detail view -->
      <div id="group-detail-view" style="display:none;">
        <button class="btn btn-secondary" id="back-to-groups" style="margin-bottom: var(--space-3);"><i class="fa-solid fa-arrow-left"></i> Volver a Grupos</button>

        <div class="group-detail-header">
          <div class="group-avatar" id="gd-avatar">EI</div>
          <div style="flex:1;">
            <h2 id="gd-name">Nombre del grupo</h2>
            <p id="gd-desc">—</p>
          </div>
          <button class="btn btn-primary" id="gd-join-btn">Unirme al grupo</button>
        </div>

        <div class="tabs-row">
          <button class="tab-btn is-active" data-tab="chat">Chat</button>
          <button class="tab-btn" data-tab="tasks">Tareas</button>
          <button class="tab-btn" data-tab="files">Archivos</button>
          <button class="tab-btn" data-tab="members">Miembros</button>
        </div>

        <div class="group-detail">
          <div>
            <div class="tab-pane" data-pane="chat">
              <div class="panel" style="padding:0; overflow:hidden;">
                <div id="gd-chat-body" style="height:360px; overflow-y:auto; padding: var(--space-3); display:flex; flex-direction:column; gap:10px; background:var(--color-bg);"></div>
                <form id="gd-chat-form" style="display:flex; gap:8px; padding:12px; border-top:1px solid var(--color-bg);">
                  <input type="text" id="gd-chat-input" placeholder="Escribe un mensaje al grupo..." style="flex:1; border:1px solid var(--color-gray); border-radius: var(--radius-pill); padding:10px 16px; outline:none;">
                  <button type="submit" class="btn btn-primary" style="border-radius:50%; width:42px; height:42px; padding:0;"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
              </div>
            </div>
            <div class="tab-pane" data-pane="tasks" style="display:none;">
              <div class="task-board" id="gd-task-board"></div>
            </div>
            <div class="tab-pane" data-pane="files" style="display:none;">
              <div class="panel" id="gd-files-list"></div>
            </div>
            <div class="tab-pane" data-pane="members" style="display:none;">
              <div class="panel" id="gd-members-list-mobile"></div>
            </div>
          </div>
          <div>
            <div class="panel" style="margin-bottom: var(--space-3);">
              <h2>Calendario</h2>
              <div id="gd-calendar"></div>
            </div>
            <div class="panel">
              <h2>Miembros (<span id="gd-member-count">0</span>)</h2>
              <div id="gd-members-list"></div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Create group modal -->
<div class="modal-backdrop" id="modal-backdrop"></div>
<div class="modal-box" id="create-group-modal" role="dialog" aria-modal="true">
  <button class="modal-close" type="button" id="create-group-close"><i class="fa-solid fa-xmark"></i></button>
  <h2>Crear nuevo grupo</h2>
  <form id="form-create-group" novalidate>
    <div class="field">
      <label for="ng-name">Nombre del grupo</label>
      <input type="text" id="ng-name" placeholder="Ej. Frontend Lima" required>
    </div>
    <div class="field">
      <label for="ng-category">Categoría</label>
      <input type="text" id="ng-category" placeholder="Ej. Tecnología, Diseño, Negocios..." required>
    </div>
    <div class="field">
      <label for="ng-desc">Descripción</label>
      <textarea id="ng-desc" placeholder="¿De qué trata este grupo?" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Crear grupo</button>
  </form>
</div>

<div class="toast" role="status" aria-live="polite"></div>

<script src="assets/scripts/auth.js"></script>
<script>
  ColabAuth.requireAuth('login.html');
  const session = ColabAuth.getSession();
  if (session) {
    const displayName = session.name || session.email;
    document.getElementById('user-name-topbar').textContent = displayName;
    document.getElementById('user-avatar-topbar').textContent = displayName.slice(0, 2).toUpperCase();
  }
  document.getElementById('logout-btn').addEventListener('click', () => {
    ColabAuth.logout();
    window.location.href = 'index.html';
  });
</script>
<script src="assets/scripts/dashboard.js"></script>
<script src="assets/scripts/groups.js"></script>
<script src="assets/scripts/chatbot.js"></script>
</body>
</html>
